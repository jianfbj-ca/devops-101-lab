name: Build and push to AWS ECR
on:
  push:
    branches: ["main"] #仅在推送到主分支时触发
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      # 步骤一：配置AWS凭证
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
        # 解释：使用在GitHub Secrets中存的钥匙登录AWS
      
      # 步骤二：登录AWS ECR
      - name: Login to AWS ECR      
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        # 解释： 获取临时的Docker登录令牌，允许推送镜像
      # 步骤三：构建、打标签并推送镜像
      - name: Build, tag, and push image to AWS ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: my-python-app
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        #解释： docker build:根据Dockerfile造出镜像；docker push: 把镜像推送到AWS仓库

      #步骤四：远程登录VM2并部署应用
      - name: Deploy to VM2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM2_IP }}
          username: ${{ secrets.VM2_USER }}
          key: ${{ secrets.VM2_SSH_KEY }}
          script: |
            # 1. 登录 AWS ECR (这一步需要 VM 2 也有 AWS 凭证，或者我们通过环境变量传递)
            # 为了简单演示，VM 2 已经通过之前的实验安装了 AWS CLI 并配置了权限
            # 现在可以直接运行：
            docker pull ${{ steps.login-ecr.outputs.registry }}/my-python-app:latest
            
            # 2. 停止并删除旧容器
            docker stop my-python-app || true
            docker rm my-python-app || true
            
            # 3. 运行新容器
            docker run -d --name my-python-app -p 5000:5000 ${{ steps.login-ecr.outputs.registry }}/my-python-app:latest 
